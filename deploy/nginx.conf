# ============================================
# 学生管理系统 - Nginx 配置
# 将此文件复制到 /etc/nginx/conf.d/student-management.conf
# ============================================

server {
    listen 80;
    server_name _;  # 替换为你的域名或IP

    # 日志
    access_log /var/log/nginx/student-management.access.log;
    error_log /var/log/nginx/student-management.error.log;

    # 前端静态文件
    location / {
        root /usr/share/nginx/html/student-management;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 后端 API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 文件上传大小限制
        client_max_body_size 50M;
    }

    # 上传文件访问
    location /uploads/ {
        alias /opt/student-management/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Druid 监控 (可选，生产环境建议限制访问)
    location /api/druid/ {
        proxy_pass http://127.0.0.1:8080/api/druid/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # 限制访问 IP (可选)
        # allow 你的IP;
        # deny all;
    }

    # Swagger 文档 (生产环境建议关闭)
    location /api/swagger-ui/ {
        proxy_pass http://127.0.0.1:8080/api/swagger-ui/;
        proxy_set_header Host $host;
    }

    location /api/v3/api-docs {
        proxy_pass http://127.0.0.1:8080/api/v3/api-docs;
        proxy_set_header Host $host;
    }

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:8080/api/actuator/health;
        proxy_set_header Host $host;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
