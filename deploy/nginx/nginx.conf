# ============================================
# 学生管理系统 - Nginx 配置
#
# 部署方式 1 (docker-compose with-nginx profile):
#   挂载到 /etc/nginx/nginx.conf, upstream 走 docker 服务名 app:8080
# 部署方式 2 (传统宿主机部署):
#   复制到 /etc/nginx/conf.d/student-management.conf, upstream 改回 127.0.0.1:8080
# ============================================

# 后端 upstream — docker-compose 模式默认使用服务名 'app'
# 传统宿主机部署: 改为 server 127.0.0.1:8080;
upstream backend {
    server app:8080;
}

server {
    listen 80;
    server_name _;  # 替换为你的域名或IP

    # 日志
    access_log /var/log/nginx/student-management.access.log;
    error_log /var/log/nginx/student-management.error.log;

    # 前端静态文件
    location / {
        root /usr/share/nginx/html/student-management;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 后端 API 代理
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE 升级支持 (workflow 推送 / actuator stream / SSE 等)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 文件上传大小限制
        client_max_body_size 50M;
    }

    # 上传文件访问
    location /uploads/ {
        alias /opt/student-management/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Druid 监控 (可选，生产环境建议限制访问)
    location /api/druid/ {
        proxy_pass http://backend/api/druid/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # 限制访问 IP (可选)
        # allow 你的IP;
        # deny all;
    }

    # Swagger 文档 (生产环境建议关闭)
    location /api/swagger-ui/ {
        proxy_pass http://backend/api/swagger-ui/;
        proxy_set_header Host $host;
    }

    location /api/v3/api-docs {
        proxy_pass http://backend/api/v3/api-docs;
        proxy_set_header Host $host;
    }

    # 健康检查
    location /health {
        proxy_pass http://backend/api/actuator/health;
        proxy_set_header Host $host;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}

# ============================================
# HTTPS — 默认禁用
# 启用条件:
#   1. 在 deploy/nginx/ssl/ 放置 cert.pem 和 key.pem
#   2. 取消下方 server block 注释
