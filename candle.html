<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>蜡烛融化动画</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;display:flex;justify-content:center;align-items:flex-end;height:100vh;overflow:hidden}
canvas{display:block;position:absolute;bottom:0;left:50%;transform:translateX(-50%)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=600,H=700;
canvas.width=W;canvas.height=H;

const MELT_DURATION=10000;
const startTime=Date.now();

// --- Candle state ---
const candleInitH=300,candleW=70,wickW=2.5,wickInitH=40;
const baseY=H-60; // candle bottom (table surface)
let candleH=candleInitH,wickH=wickInitH;
let waxDrops=[];
let smokeParticles=[];
let flameOut=false,flameOutTime=0;

// --- Perlin-ish noise (simple) ---
function noise(t){return(Math.sin(t*1.3+Math.sin(t*0.7)*2)+Math.sin(t*2.7)*0.5+Math.sin(t*4.1)*0.25)/1.75}

// --- Flame particles ---
let flameParticles=[];
function spawnFlame(cx,cy,intensity){
  const count=Math.floor(3*intensity+Math.random()*2);
  for(let i=0;i<count;i++){
    flameParticles.push({
      x:cx+(Math.random()-0.5)*6*intensity,
      y:cy,
      vx:(Math.random()-0.5)*0.6,
      vy:-(1.5+Math.random()*2)*intensity,
      life:0,maxLife:20+Math.random()*25,
      size:(3+Math.random()*5)*intensity,
      hue:30+Math.random()*25
    });
  }
}

function updateFlame(){
  for(let i=flameParticles.length-1;i>=0;i--){
    const p=flameParticles[i];
    p.life++;
    p.x+=p.vx+noise(p.life*0.2+p.x)*0.4;
    p.vy*=0.98;
    p.y+=p.vy;
    p.size*=0.97;
    if(p.life>p.maxLife||p.size<0.3)flameParticles.splice(i,1);
  }
}

function drawFlame(cx,cy,t,intensity){
  // Main flame shape via layered gradients
  ctx.save();
  const flicker=noise(t*3)*3*intensity;
  const sway=noise(t*1.5)*4*intensity;
  const fh=60*intensity;
  const fw=18*intensity;

  // Outer glow
  const grd0=ctx.createRadialGradient(cx+sway,cy-fh*0.4,0,cx+sway,cy-fh*0.3,fh*1.2);
  grd0.addColorStop(0,`rgba(255,160,40,${0.12*intensity})`);
  grd0.addColorStop(0.5,`rgba(255,100,20,${0.05*intensity})`);
  grd0.addColorStop(1,'rgba(255,60,10,0)');
  ctx.fillStyle=grd0;
  ctx.fillRect(cx-fh*1.5,cy-fh*2,fh*3,fh*2.5);

  // Draw flame body using bezier
  for(let layer=0;layer<3;layer++){
    ctx.beginPath();
    const layerScale=1-layer*0.25;
    const lfw=fw*layerScale;
    const lfh=fh*layerScale;
    const lsway=sway*(1-layer*0.15);
    const tipX=cx+lsway+flicker*0.3;
    const tipY=cy-lfh-flicker;

    ctx.moveTo(cx-lfw*0.15,cy);
    // Left side
    ctx.bezierCurveTo(
      cx-lfw+noise(t*2+layer)*3,cy-lfh*0.3,
      tipX-lfw*0.5+noise(t*2.5+layer)*2,cy-lfh*0.7,
      tipX,tipY
    );
    // Right side
    ctx.bezierCurveTo(
      tipX+lfw*0.5+noise(t*2.8+layer)*2,cy-lfh*0.7,
      cx+lfw+noise(t*3.1+layer)*3,cy-lfh*0.3,
      cx+lfw*0.15,cy
    );
    ctx.closePath();

    if(layer===0){
      const g=ctx.createLinearGradient(cx,cy,tipX,tipY);
      g.addColorStop(0,`rgba(255,180,50,${0.9*intensity})`);
      g.addColorStop(0.3,`rgba(255,120,20,${0.85*intensity})`);
      g.addColorStop(0.6,`rgba(255,80,10,${0.6*intensity})`);
      g.addColorStop(1,`rgba(255,50,5,${0.1*intensity})`);
      ctx.fillStyle=g;
    }else if(layer===1){
      const g=ctx.createLinearGradient(cx,cy,tipX,tipY);
      g.addColorStop(0,`rgba(255,230,120,${0.95*intensity})`);
      g.addColorStop(0.4,`rgba(255,200,80,${0.8*intensity})`);
      g.addColorStop(0.8,`rgba(255,140,30,${0.4*intensity})`);
      g.addColorStop(1,'rgba(255,100,10,0)');
      ctx.fillStyle=g;
    }else{
      const g=ctx.createLinearGradient(cx,cy-5,tipX,tipY+lfh*0.2);
      g.addColorStop(0,`rgba(255,255,220,${1*intensity})`);
      g.addColorStop(0.3,`rgba(255,250,200,${0.9*intensity})`);
      g.addColorStop(0.7,`rgba(255,220,130,${0.5*intensity})`);
      g.addColorStop(1,'rgba(255,200,80,0)');
      ctx.fillStyle=g;
    }
    ctx.fill();
  }

  // Blue core at base
  ctx.beginPath();
  const bw=8*intensity,bh=12*intensity;
  ctx.ellipse(cx,cy-2,bw,bh,0,0,Math.PI*2);
  const bg=ctx.createRadialGradient(cx,cy-2,0,cx,cy-2,bh);
  bg.addColorStop(0,`rgba(100,150,255,${0.7*intensity})`);
  bg.addColorStop(0.5,`rgba(80,120,255,${0.3*intensity})`);
  bg.addColorStop(1,'rgba(60,80,200,0)');
  ctx.fillStyle=bg;
  ctx.fill();

  // Particles
  for(const p of flameParticles){
    const a=(1-p.life/p.maxLife)*0.6*intensity;
    const r=p.size;
    const pg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r);
    pg.addColorStop(0,`hsla(${p.hue},100%,70%,${a})`);
    pg.addColorStop(1,`hsla(${p.hue},100%,50%,0)`);
    ctx.fillStyle=pg;
    ctx.fillRect(p.x-r,p.y-r,r*2,r*2);
  }

  ctx.restore();
}

// --- Smoke ---
function spawnSmoke(cx,cy){
  smokeParticles.push({
    x:cx+(Math.random()-0.5)*4,y:cy,
    vx:(Math.random()-0.5)*0.5,vy:-(0.5+Math.random()*1.2),
    life:0,maxLife:60+Math.random()*40,
    size:2+Math.random()*3,
    opacity:0.3+Math.random()*0.2
  });
}

function updateSmoke(){
  for(let i=smokeParticles.length-1;i>=0;i--){
    const p=smokeParticles[i];
    p.life++;
    p.x+=p.vx+noise(p.life*0.1+p.y*0.01)*0.8;
    p.y+=p.vy;
    p.vy*=0.99;
    p.size+=0.08;
    p.opacity*=0.98;
    if(p.life>p.maxLife)smokeParticles.splice(i,1);
  }
}

function drawSmoke(){
  for(const p of smokeParticles){
    const a=p.opacity*(1-p.life/p.maxLife);
    if(a<=0)continue;
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
    g.addColorStop(0,`rgba(180,180,195,${a})`);
    g.addColorStop(1,'rgba(150,150,165,0)');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  }
}

// --- Wax drip ---
function maybeSpawnDrip(cx,topY,progress){
  if(Math.random()<0.008+progress*0.015){
    const side=Math.random()<0.5?-1:1;
    waxDrops.push({
      x:cx+side*(candleW/2-2+Math.random()*3),
      y:topY+Math.random()*20,
      vy:0.3+Math.random()*0.5,
      size:2+Math.random()*2.5,
      maxTravel:30+Math.random()*60,
      traveled:0,
      opacity:0.85
    });
  }
}

function updateDrips(){
  for(let i=waxDrops.length-1;i>=0;i--){
    const d=waxDrops[i];
    d.y+=d.vy;
    d.traveled+=d.vy;
    d.vy*=0.995;
    if(d.traveled>d.maxTravel)d.vy*=0.9;
    if(d.vy<0.02||d.y>baseY){
      d.vy=0;
      d.opacity*=0.995;
      if(d.opacity<0.1)waxDrops.splice(i,1);
    }
  }
}

function drawDrips(){
  for(const d of waxDrops){
    ctx.beginPath();
    ctx.arc(d.x,d.y,d.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(230,210,170,${d.opacity})`;
    ctx.fill();
    // drip trail
    ctx.beginPath();
    ctx.moveTo(d.x-d.size*0.6,d.y);
    ctx.lineTo(d.x,d.y-d.size*3);
    ctx.lineTo(d.x+d.size*0.6,d.y);
    ctx.fillStyle=`rgba(225,205,165,${d.opacity*0.6})`;
    ctx.fill();
  }
}

// --- Candle body ---
function drawCandle(cx,topY,h,progress){
  const w=candleW;
  const meltBulge=progress*12;

  // Body
  const bodyGrad=ctx.createLinearGradient(cx-w/2,0,cx+w/2,0);
  bodyGrad.addColorStop(0,'#c4a35a');
  bodyGrad.addColorStop(0.15,'#e8d5a0');
  bodyGrad.addColorStop(0.4,'#f5ecd0');
  bodyGrad.addColorStop(0.6,'#f2e8c8');
  bodyGrad.addColorStop(0.85,'#dcc480');
  bodyGrad.addColorStop(1,'#b89840');

  ctx.beginPath();
  // Left side (slightly curved from melting)
  ctx.moveTo(cx-w/2-meltBulge*0.3,baseY);
  ctx.bezierCurveTo(
    cx-w/2-meltBulge*0.5,baseY-h*0.3,
    cx-w/2,topY+10,
    cx-w/2+2,topY
  );
  // Top (melted pool)
  const poolDepth=3+progress*8;
  ctx.bezierCurveTo(cx-w/4,topY+poolDepth,cx+w/4,topY+poolDepth,cx+w/2-2,topY);
  // Right side
  ctx.bezierCurveTo(
    cx+w/2,topY+10,
    cx+w/2+meltBulge*0.5,baseY-h*0.3,
    cx+w/2+meltBulge*0.3,baseY
  );
  ctx.closePath();
  ctx.fillStyle=bodyGrad;
  ctx.fill();

  // Wax pool on top
  ctx.beginPath();
  ctx.ellipse(cx,topY+poolDepth*0.5,w/2-1,poolDepth*0.7+2,0,0,Math.PI*2);
  const poolGrad=ctx.createRadialGradient(cx,topY+poolDepth*0.5,0,cx,topY+poolDepth*0.5,w/2);
  poolGrad.addColorStop(0,'rgba(255,240,200,0.9)');
  poolGrad.addColorStop(0.3,'rgba(245,225,175,0.8)');
  poolGrad.addColorStop(0.7,'rgba(230,210,155,0.5)');
  poolGrad.addColorStop(1,'rgba(220,195,130,0.3)');
  ctx.fillStyle=poolGrad;
  ctx.fill();

  // Molten wax puddle at base (grows with melting)
  if(progress>0.1){
    const puddleW=w/2+meltBulge*2+progress*25;
    const puddleH=3+progress*8;
    ctx.beginPath();
    ctx.ellipse(cx,baseY+2,puddleW,puddleH,0,0,Math.PI*2);
    const puddleGrad=ctx.createRadialGradient(cx,baseY+2,0,cx,baseY+2,puddleW);
    puddleGrad.addColorStop(0,'rgba(240,225,180,0.7)');
    puddleGrad.addColorStop(0.7,'rgba(220,200,150,0.4)');
    puddleGrad.addColorStop(1,'rgba(200,180,130,0)');
    ctx.fillStyle=puddleGrad;
    ctx.fill();
  }
}

// --- Wick ---
function drawWick(cx,topY,t,intensity){
  const wh=wickH;
  ctx.beginPath();
  ctx.moveTo(cx,topY+3);
  const sway=noise(t*2)*2*intensity;
  ctx.quadraticCurveTo(cx+sway*0.5,topY-wh*0.5,cx+sway,topY-wh);
  ctx.strokeStyle='#2a2015';
  ctx.lineWidth=wickW;
  ctx.stroke();

  // Glowing ember at tip
  if(intensity>0){
    ctx.beginPath();
    ctx.arc(cx+sway,topY-wh+1,2.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,140,30,${0.8*intensity})`;
    ctx.fill();
  }
}

// --- Table surface ---
function drawTable(){
  const g=ctx.createLinearGradient(0,baseY+10,0,H);
  g.addColorStop(0,'#1a1520');
  g.addColorStop(0.3,'#141018');
  g.addColorStop(1,'#0a0a12');
  ctx.fillStyle=g;
  ctx.fillRect(0,baseY+10,W,H-baseY);

  // Subtle reflection line
  ctx.beginPath();
  ctx.moveTo(0,baseY+12);
  ctx.lineTo(W,baseY+12);
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  ctx.lineWidth=1;
  ctx.stroke();
}

// --- Ambient light from flame ---
function drawAmbientLight(cx,flameY,intensity){
  const g=ctx.createRadialGradient(cx,flameY-30,10,cx,flameY+50,350);
  g.addColorStop(0,`rgba(255,150,50,${0.08*intensity})`);
  g.addColorStop(0.3,`rgba(255,100,30,${0.04*intensity})`);
  g.addColorStop(0.7,`rgba(255,60,10,${0.01*intensity})`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);
}

// --- Main loop ---
function frame(){
  const now=Date.now();
  const elapsed=now-startTime;
  const t=elapsed/1000;
  let progress=Math.min(elapsed/MELT_DURATION,1); // 0→1 over 10s

  // Ease
  const eased=progress<0.3?progress/0.3*0.2:0.2+(progress-0.3)/0.7*0.8;
  candleH=candleInitH*(1-eased*0.85);
  wickH=wickInitH*(1-progress*0.3);

  // Flame intensity
  let intensity=1;
  if(progress>0.85){
    intensity=Math.max(0,(1-progress)/0.15);
    if(!flameOut&&intensity<=0){flameOut=true;flameOutTime=now;}
  }

  const cx=W/2;
  const topY=baseY-candleH;
  const flameBaseY=topY-wickH+3;

  // Clear
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle='#0a0a12';
  ctx.fillRect(0,0,W,H);

  // Ambient light
  if(intensity>0)drawAmbientLight(cx,flameBaseY,intensity);

  // Table
  drawTable();

  // Candle
  drawCandle(cx,topY,candleH,progress);

  // Drips
  if(intensity>0)maybeSpawnDrip(cx,topY,progress);
  updateDrips();
  drawDrips();

  // Wick
  drawWick(cx,topY,t,intensity);

  // Flame
  if(intensity>0){
    spawnFlame(cx+noise(t*1.5)*2,flameBaseY,intensity);
    updateFlame();
    drawFlame(cx,flameBaseY,t,intensity);
  }

  // Smoke (appears more when flame is dying, and after flame out)
  if(progress>0.7&&intensity>0){
    if(Math.random()<0.3)spawnSmoke(cx+noise(t*1.5)*3,flameBaseY-40*intensity);
  }
  if(flameOut){
    const smokeElapsed=now-flameOutTime;
    if(smokeElapsed<3000&&Math.random()<0.25*(1-smokeElapsed/3000)){
      spawnSmoke(cx,topY-wickH-5);
    }
  }
  updateSmoke();
  drawSmoke();

  // Timer text
  const remaining=Math.max(0,(MELT_DURATION-elapsed)/1000);
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.font='14px monospace';
  ctx.textAlign='center';
  if(remaining>0){
    ctx.fillText(remaining.toFixed(1)+'s',cx,H-20);
  }else{
    ctx.fillText('burned out',cx,H-20);
  }

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
