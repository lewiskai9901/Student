<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书粉丝查询</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.container{max-width:620px;margin:0 auto;padding:20px 16px}
h1{font-size:20px;font-weight:600;margin-bottom:16px;color:#ff2442}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:14px}

/* Code Entry */
.code-card{text-align:center;padding:30px 20px}
.code-card h2{font-size:16px;font-weight:500;margin-bottom:6px}
.code-card p{font-size:13px;color:#999;margin-bottom:20px}
.code-input{width:200px;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:18px;font-weight:600;text-align:center;letter-spacing:2px;outline:none;font-family:monospace;transition:border-color .2s}
.code-input:focus{border-color:#ff2442}
.code-input::placeholder{font-size:14px;font-weight:400;letter-spacing:0;color:#ccc}
.code-btn{display:block;width:200px;margin:16px auto 0;padding:12px;background:#ff2442;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;transition:opacity .2s}
.code-btn:hover{opacity:.85}
.code-btn:disabled{opacity:.5;cursor:not-allowed}
.code-msg{font-size:12px;margin-top:10px;min-height:18px}
.code-msg.error{color:#ff4d4f}
.code-msg.info{color:#999}

/* QR Login */
.qr-area{margin:20px auto;text-align:center}
.qr-area img{max-width:260px;border-radius:8px;border:1px solid #eee}
.qr-hint{font-size:13px;color:#666;margin-top:10px}
.qr-status{font-size:12px;color:#999;margin-top:6px}
.qr-cancel{font-size:12px;color:#999;cursor:pointer;margin-top:10px;display:inline-block}
.qr-cancel:hover{color:#ff4d4f}

/* User Bar */
.user-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:10px 16px;background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.user-info{display:flex;align-items:center;gap:8px;font-size:14px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#ff2442;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.user-name{font-weight:500}
.user-code{font-size:11px;color:#999;font-family:monospace}
.logout-btn{font-size:12px;color:#999;cursor:pointer;border:none;background:none}
.logout-btn:hover{color:#ff4d4f}

/* Query */
.input-row{display:flex;gap:8px;margin-bottom:10px}
textarea#accountInput{flex:1;padding:10px 14px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;resize:vertical;min-height:42px;height:42px;font-family:monospace;line-height:1.5}
textarea#accountInput:focus{border-color:#ff2442}
textarea#accountInput::placeholder{color:#bbb;font-family:-apple-system,sans-serif}
.btn-row{display:flex;gap:6px;flex-shrink:0;align-items:flex-start}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500;transition:all .2s;white-space:nowrap}
.btn:hover{opacity:.85}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#ff2442;color:#fff}
.btn-stop{background:#ff4d4f;color:#fff;display:none}
.btn-ghost{background:none;color:#999;border:1px solid #e0e0e0;padding:10px 14px}
.hint{font-size:12px;color:#bbb}

/* Results */
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.result-header span{font-size:14px;font-weight:500}
.result-stats{font-size:12px;color:#999}
.progress-bar{height:3px;background:#f0f0f0;border-radius:2px;margin-bottom:10px;overflow:hidden;display:none}
.progress-bar.show{display:block}
.progress-fill{height:100%;background:#ff2442;border-radius:2px;transition:width .3s ease}
.result-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid #f5f5f5}
.result-item:last-child{border-bottom:none}
.result-idx{font-size:12px;color:#ccc;min-width:18px;text-align:right}
.result-account{font-size:13px;color:#888;min-width:110px;font-family:monospace}
.result-info{display:flex;flex-direction:column;gap:2px;flex:1}
.result-fans{font-size:20px;font-weight:700;color:#ff2442;font-family:monospace}
.result-fans.loading{font-size:13px;color:#999;font-weight:400}
.result-fans.error{font-size:13px;color:#ff4d4f;font-weight:400}
.result-nickname{font-size:13px;color:#333}
.empty-hint{color:#ddd;text-align:center;padding:40px 0;font-size:14px}
.log-area{background:#1a1a1a;color:#d4d4d4;border-radius:8px;padding:12px;font-size:11px;font-family:monospace;max-height:160px;overflow:auto;line-height:1.6;margin-top:10px;display:none}
.log-area.show{display:block}
.log-info{color:#6a9955}.log-warn{color:#dcdcaa}.log-error{color:#f44747}.log-success{color:#4ec9b0}
.log-toggle{font-size:12px;color:#bbb;cursor:pointer}.log-toggle:hover{color:#666}
</style>
</head>
<body>

<div class="container">
  <h1>小红书粉丝查询</h1>

  <!-- Step 1: Enter Code -->
  <div id="codeScreen">
    <div class="card code-card">
      <h2>输入你的编码</h2>
      <p>每个编码绑定一个小红书账号，换设备输入相同编码即可使用</p>
      <input type="text" class="code-input" id="codeInput" placeholder="编码" maxlength="20"
        onkeydown="if(event.key==='Enter')submitCode()">
      <button class="code-btn" id="codeBtn" onclick="submitCode()">进入</button>
      <div class="code-msg" id="codeMsg"></div>
    </div>
  </div>

  <!-- Step 2: QR Login (if needed) -->
  <div id="loginScreen" style="display:none">
    <div class="card code-card">
      <h2>扫码登录小红书</h2>
      <p id="loginHint">编码 <b id="loginCode"></b> 需要登录小红书账号</p>
      <button class="code-btn" id="startLoginBtn" onclick="startLogin()">获取登录二维码</button>
      <div class="qr-area" id="qrArea" style="display:none">
        <img id="qrImage" src="" alt="二维码">
        <div class="qr-hint">用小红书APP扫描二维码</div>
        <div class="qr-status" id="qrStatus">等待扫码...</div>
      </div>
      <span class="qr-cancel" onclick="backToCode()">返回</span>
    </div>
  </div>

  <!-- Step 3: Main Query -->
  <div id="mainScreen" style="display:none">
    <div class="user-bar">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">U</div>
        <div>
          <span class="user-name" id="userName">用户</span>
          <div class="user-code" id="userCode"></div>
        </div>
      </div>
      <button class="logout-btn" onclick="backToCode()">切换账号</button>
    </div>

    <div class="card">
      <div class="input-row">
        <textarea id="accountInput" placeholder="输入小红书号，多个用逗号或换行分隔"></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" id="queryBtn" onclick="doQuery()">查询</button>
          <button class="btn btn-stop" id="stopBtn" onclick="doStop()">停止</button>
          <button class="btn btn-ghost" onclick="clearResults()">清空</button>
        </div>
      </div>
      <div class="hint">支持批量查询，每个账号间隔约10秒</div>
    </div>

    <div class="card">
      <div class="result-header">
        <span>查询结果</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="result-stats" id="resultStats"></span>
          <span class="log-toggle" onclick="toggleLog()">日志</span>
        </div>
      </div>
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      <div id="resultArea"><div class="empty-hint" id="emptyHint">输入小红书号后点击查询</div></div>
      <div class="log-area" id="logArea"></div>
    </div>
  </div>
</div>

<script>
const API = location.origin;
let currentCode = localStorage.getItem('xhs_code') || '';
let querying = false, stopRequested = false, loginPollTimer = null, loginToken = '';

// ======== Screens ========
function showScreen(name) {
  document.getElementById('codeScreen').style.display = name === 'code' ? '' : 'none';
  document.getElementById('loginScreen').style.display = name === 'login' ? '' : 'none';
  document.getElementById('mainScreen').style.display = name === 'main' ? '' : 'none';
}

function showMain(code, nickname) {
  currentCode = code;
  localStorage.setItem('xhs_code', code);
  document.getElementById('userName').textContent = nickname || '用户';
  document.getElementById('userAvatar').textContent = (nickname || 'U')[0].toUpperCase();
  document.getElementById('userCode').textContent = '编码: ' + code;
  showScreen('main');
}

function showLogin(code, msg) {
  document.getElementById('loginCode').textContent = code;
  if (msg) document.getElementById('loginHint').innerHTML = msg;
  else document.getElementById('loginHint').innerHTML = '编码 <b>' + code + '</b> 需要登录小红书账号';
  document.getElementById('startLoginBtn').style.display = '';
  document.getElementById('startLoginBtn').disabled = false;
  document.getElementById('startLoginBtn').textContent = '获取登录二维码';
  document.getElementById('qrArea').style.display = 'none';
  showScreen('login');
}

function backToCode() {
  clearInterval(loginPollTimer);
  currentCode = '';
  showScreen('code');
  document.getElementById('codeInput').value = localStorage.getItem('xhs_code') || '';
}

// ======== Code Entry ========
async function submitCode() {
  const code = document.getElementById('codeInput').value.trim();
  const msg = document.getElementById('codeMsg');
  if (!code) { msg.textContent = '请输入编码'; msg.className = 'code-msg error'; return; }

  const btn = document.getElementById('codeBtn');
  btn.disabled = true;
  msg.textContent = '检查中...'; msg.className = 'code-msg info';

  try {
    const resp = await fetch(`${API}/api/auth/check?code=${encodeURIComponent(code)}`, { signal: AbortSignal.timeout(8000) });
    const data = await resp.json();

    if (data.exists && !data.loginExpired) {
      // Has valid cookies -> go to query
      showMain(code, data.nickname);
    } else if (data.exists && data.loginExpired) {
      // Cookies expired
      currentCode = code;
      showLogin(code, '编码 <b>' + code + '</b> 的登录已过期，请重新扫码');
    } else {
      // New code or no cookies
      currentCode = code;
      showLogin(code);
    }
  } catch (e) {
    msg.textContent = '服务未连接，请确认后端已启动';
    msg.className = 'code-msg error';
  }
  btn.disabled = false;
}

// ======== Login ========
async function startLogin() {
  const btn = document.getElementById('startLoginBtn');
  btn.disabled = true;
  btn.textContent = '获取二维码中...';

  try {
    const resp = await fetch(`${API}/api/login/start?code=${encodeURIComponent(currentCode)}`, { signal: AbortSignal.timeout(30000) });
    const data = await resp.json();
    if (data.error) { btn.textContent = '失败: ' + data.error; btn.disabled = false; return; }

    loginToken = data.loginToken;
    if (data.qrImage) {
      document.getElementById('qrImage').src = data.qrImage;
      document.getElementById('qrArea').style.display = '';
      btn.style.display = 'none';
      startLoginPoll();
    } else {
      btn.textContent = '未获取到二维码，点击重试';
      btn.disabled = false;
    }
  } catch (e) {
    btn.textContent = '连接失败，点击重试';
    btn.disabled = false;
  }
}

function startLoginPoll() {
  clearInterval(loginPollTimer);
  loginPollTimer = setInterval(pollLogin, 3000);
}

async function pollLogin() {
  if (!loginToken) return;
  try {
    const resp = await fetch(`${API}/api/login/check?token=${loginToken}`, { signal: AbortSignal.timeout(10000) });
    const data = await resp.json();

    if (data.status === 'success') {
      clearInterval(loginPollTimer);
      showMain(currentCode, data.nickname);
      return;
    }
    if (data.status === 'expired') {
      clearInterval(loginPollTimer);
      document.getElementById('qrStatus').textContent = '二维码已过期';
      const btn = document.getElementById('startLoginBtn');
      btn.style.display = ''; btn.disabled = false; btn.textContent = '重新获取二维码';
      document.getElementById('qrArea').style.display = 'none';
      return;
    }
    if (data.qrImage) document.getElementById('qrImage').src = data.qrImage;
    document.getElementById('qrStatus').textContent = '等待扫码...';
  } catch (e) {
    document.getElementById('qrStatus').textContent = '检测中...';
  }
}

// ======== Init ========
(async function() {
  if (currentCode) {
    document.getElementById('codeInput').value = currentCode;
    try {
      const resp = await fetch(`${API}/api/auth/check?code=${encodeURIComponent(currentCode)}`, { signal: AbortSignal.timeout(5000) });
      const data = await resp.json();
      if (data.exists && !data.loginExpired) { showMain(currentCode, data.nickname); return; }
      if (data.exists && data.loginExpired) { showLogin(currentCode, '编码 <b>' + currentCode + '</b> 的登录已过期'); return; }
    } catch (e) {}
  }
  showScreen('code');
})();

// ======== Logging ========
function log(m, t='info') {
  const el = document.getElementById('logArea');
  const d = document.createElement('div');
  d.className = 'log-' + t;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${m}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}
function toggleLog() { document.getElementById('logArea').classList.toggle('show'); }

// ======== Query ========
function parseAccounts(t) { return t.split(/[,，\n\r\s]+/).map(s=>s.trim()).filter(Boolean); }

function createRow(account, idx) {
  const d = document.createElement('div'); d.className = 'result-item'; d.id = 'result-' + account;
  d.innerHTML = `<span class="result-idx">${idx}</span><span class="result-account">${account}</span>
    <div class="result-info"><span class="result-fans loading" id="fans-${account}">等待查询...</span>
    <span class="result-nickname" id="nick-${account}"></span></div>`;
  return d;
}

function updateRow(account, {fans, nickname, error}) {
  const f = document.getElementById('fans-' + account);
  const n = document.getElementById('nick-' + account);
  if (!f) return;
  if (error) { f.textContent = error; f.className = 'result-fans error'; }
  else { f.textContent = fans != null ? fans : '-'; f.className = 'result-fans'; }
  if (n && nickname) n.textContent = nickname;
}

async function queryOne(account) {
  const f = document.getElementById('fans-' + account);
  if (f) { f.textContent = '查询中...'; f.className = 'result-fans loading'; }
  log(`查询: ${account}`);
  try {
    const resp = await fetch(`${API}/api/query?id=${encodeURIComponent(account)}&code=${encodeURIComponent(currentCode)}`, { signal: AbortSignal.timeout(60000) });
    const data = await resp.json();
    if (data.needLogin) {
      log('登录已过期', 'error');
      updateRow(account, { error: '需要重新登录' });
      return { abort: true };
    }
    if (resp.status === 429) { log(`[${account}] 繁忙`, 'warn'); return { retry: true }; }
    if (data.success) {
      log(`[${account}] ${data.nickname||'-'} — ${data.fans!=null?data.fans+' 粉丝':'未获取'}`, 'success');
      updateRow(account, { fans: data.fans, nickname: data.nickname });
      return {};
    }
    log(`[${account}] ${data.error||'未知'}`, 'error');
    updateRow(account, { error: data.error || '查询失败' });
    return {};
  } catch (e) {
    log(`[${account}] ${e.message}`, 'error');
    updateRow(account, { error: e.message });
    return {};
  }
}

async function doQuery() {
  if (querying) return;
  const text = document.getElementById('accountInput').value.trim();
  if (!text) return;
  const accounts = parseAccounts(text);
  if (!accounts.length) return;

  querying = true; stopRequested = false;
  document.getElementById('queryBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = '';
  document.getElementById('emptyHint').style.display = 'none';
  document.getElementById('progressBar').classList.add('show');
  document.getElementById('logArea').classList.add('show');

  const area = document.getElementById('resultArea');
  for (let i = 0; i < accounts.length; i++) {
    if (!document.getElementById('result-' + accounts[i]))
      area.appendChild(createRow(accounts[i], i + 1));
  }

  let done = 0;
  document.getElementById('resultStats').textContent = `0/${accounts.length}`;

  for (const a of accounts) {
    if (stopRequested) { log('已停止', 'warn'); break; }
    const r = await queryOne(a);
    if (r?.abort) {
      showLogin(currentCode, '编码 <b>' + currentCode + '</b> 的登录已过期，请重新扫码');
      break;
    }
    if (r?.retry) { await new Promise(r=>setTimeout(r,3000)); if(!stopRequested) await queryOne(a); }
    done++;
    document.getElementById('resultStats').textContent = `${done}/${accounts.length}`;
    document.getElementById('progressFill').style.width = `${(done/accounts.length*100).toFixed(1)}%`;
    if (done < accounts.length && !stopRequested) await new Promise(r=>setTimeout(r,3000));
  }

  querying = false;
  document.getElementById('queryBtn').style.display = '';
  document.getElementById('stopBtn').style.display = 'none';
  if (!stopRequested) log('全部完成', 'success');
}

function doStop() { stopRequested = true; }
function clearResults() {
  document.getElementById('resultArea').innerHTML = '<div class="empty-hint" id="emptyHint">输入小红书号后点击查询</div>';
  document.getElementById('logArea').innerHTML = '';
  document.getElementById('logArea').classList.remove('show');
  document.getElementById('progressBar').classList.remove('show');
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('resultStats').textContent = '';
}

document.getElementById('accountInput')?.addEventListener('input', function() {
  this.style.height = '42px'; this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
