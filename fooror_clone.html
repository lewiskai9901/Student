<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fooror Style | Immersive Design</title>
    <style>
        /* 引入高端设计感字体 */
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Manrope:wght@300;500&display=swap');

        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #ff3333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* 隐藏默认鼠标，使用自定义光标 */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
        }

        /* --- 自定义光标系统 --- */
        .cursor-dot,
        .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: white;
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: width 0.2s, height 0.2s, background-color 0.2s; /* 悬停时的弹性动画 */
        }

        /* 悬停状态下的光标变化 */
        body:hover .cursor-outline.hovered {
            width: 80px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.1);
            border-color: transparent;
            backdrop-filter: blur(2px);
        }

        /* --- 噪点纹理背景 (增加质感) --- */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9000;
            opacity: 0.05;
            background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* --- 导航栏 --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            mix-blend-mode: difference; /* 差值混合模式，让文字在黑白背景上都可见 */
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        .menu-btn {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Hero 首屏 --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hero h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 8vw;
            font-weight: 700;
            text-transform: uppercase;
            line-height: 0.9;
            text-align: center;
            mix-blend-mode: difference;
            z-index: 2;
        }

        .hero h1 span {
            display: block;
            opacity: 0;
            transform: translateY(100px);
            animation: reveal 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .hero h1 span:nth-child(2) {
            animation-delay: 0.2s;
            color: transparent;
            -webkit-text-stroke: 2px white; /* 镂空文字效果 */
        }

        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 悬浮的装饰图片 */
        .hero-img {
            position: absolute;
            width: 30vw;
            height: 40vh;
            object-fit: cover;
            z-index: 1;
            opacity: 0.6;
            filter: grayscale(100%);
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(-5deg); }
            50% { transform: translate(20px, -20px) rotate(5deg); }
        }

        /* --- 跑马灯文字带 --- */
        .marquee {
            padding: 100px 0;
            background: white;
            color: black;
            overflow: hidden;
            white-space: nowrap;
            transform: rotate(-2deg) scale(1.1); /* 倾斜设计 */
        }

        .marquee-content {
            display: inline-block;
            font-family: 'Syncopate', sans-serif;
            font-size: 6rem;
            font-weight: 700;
            animation: scroll 20s linear infinite;
        }

        @keyframes scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* --- 项目展示区 --- */
        .projects {
            padding: 150px 10vw;
        }

        .project-item {
            position: relative;
            margin-bottom: 150px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .project-item:nth-child(even) {
            flex-direction: row-reverse; /* 左右交替布局 */
        }

        .p-info {
            width: 40%;
        }

        .p-num {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 20px;
            display: block;
        }

        .p-title {
            font-size: 3rem;
            margin-bottom: 30px;
            line-height: 1.1;
        }

        .p-img-wrapper {
            width: 50%;
            height: 60vh;
            overflow: hidden;
            position: relative;
        }

        .p-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1);
            filter: grayscale(100%);
        }

        .project-item:hover .p-img {
            transform: scale(1.1);
            filter: grayscale(0%); /* 悬停变彩色 */
        }

    </style>
</head>
<body>

    <!-- 噪点层 -->
    <div class="noise"></div>

    <!-- 自定义光标 -->
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>

    <nav>
        <div class="logo hover-target">FOOROR</div>
        <div class="menu-btn hover-target">MENU</div>
    </nav>

    <section class="hero">
        <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop" class="hero-img" alt="Abstract">
        <h1>
            <span>Digital</span>
            <span>Reality</span>
        </h1>
    </section>

    <div class="marquee">
        <div class="marquee-content">
            CREATIVE DESIGN • INTERACTIVE EXPERIENCE • WEBGL • MOTION • CREATIVE DESIGN • INTERACTIVE EXPERIENCE • WEBGL • MOTION • 
        </div>
    </div>

    <section class="projects">
        <div class="project-item">
            <div class="p-info">
                <span class="p-num">01</span>
                <h2 class="p-title">Cyber<br>Punk</h2>
                <p style="color: #888; margin-bottom: 30px;">Immersive web experience for future tech.</p>
            </div>
            <div class="p-img-wrapper hover-target">
                <img src="https://images.unsplash.com/photo-1535378433864-48cf1041e8ee?q=80&w=1000&auto=format&fit=crop" class="p-img" alt="Project 1">
            </div>
        </div>

        <div class="project-item">
            <div class="p-info">
                <span class="p-num">02</span>
                <h2 class="p-title">Neon<br>Lights</h2>
                <p style="color: #888; margin-bottom: 30px;">Brand identity for night life culture.</p>
            </div>
            <div class="p-img-wrapper hover-target">
                <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1000&auto=format&fit=crop" class="p-img" alt="Project 2">
            </div>
        </div>
    </section>

    <script>
        // 光标逻辑
        const cursorDot = document.getElementById('cursor-dot');
        const cursorOutline = document.getElementById('cursor-outline');
        const hoverTargets = document.querySelectorAll('.hover-target');

        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;

            // 点：瞬间跟随
            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;

            // 圈：延迟跟随 (增加平滑感)
            cursorOutline.animate({
                left: `${posX}px`,
                top: `${posY}px`
            }, { duration: 500, fill: "forwards" });
        });

        // 悬停效果
        hoverTargets.forEach(target => {
            target.addEventListener('mouseenter', () => {
                cursorOutline.classList.add('hovered');
            });
            target.addEventListener('mouseleave', () => {
                cursorOutline.classList.remove('hovered');
            });
        });

        // 滚动显现动画
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = 1;
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        });

        document.querySelectorAll('.project-item').forEach(item => {
            item.style.opacity = 0;
            item.style.transform = 'translateY(50px)';
            item.style.transition = 'all 1s ease';
            observer.observe(item);
        });
    </script>
</body>
</html>
