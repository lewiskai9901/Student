name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and Push Docker Image
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build backend JAR
        working-directory: ./backend
        run: mvn package -DskipTests -B

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event.inputs.environment == 'staging' || github.event_name == 'release'
    environment:
      name: staging
      url: https://staging.example.com

    steps:
      # TODO(P1-6): 部署目标未定 (SSH / k8s / GHCR Webhook 任一). 真实部署时把
      # 下方 echo 占位换成具体命令. 几种典型实现:
      #   - SSH: appleboy/ssh-action@master + docker compose pull && up -d
      #   - K8s: azure/setup-kubectl@v3 + kubectl set image
      #   - Webhook: 服务器自维 watchtower/docker-rollout 拉镜像
      # 现状: release 触发后只 build + push GHCR, 真服务器无动作.
      - name: Deploy to staging server (PLACEHOLDER)
        run: |
          echo "[STAGING] image=${{ needs.build-image.outputs.image-tag }}"
          echo "[STAGING] deployment target not configured — see TODO(P1-6) above"
          # 示例 SSH 部署:
          # - uses: appleboy/ssh-action@master
          #   with:
          #     host: ${{ secrets.STAGING_HOST }}
          #     username: ${{ secrets.STAGING_USER }}
          #     key: ${{ secrets.STAGING_SSH_KEY }}
          #     script: |
          #       cd /opt/student-management
          #       docker compose pull app && docker compose up -d --no-deps app

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-image, deploy-staging]
    if: github.event.inputs.environment == 'production' || github.event_name == 'release'
    environment:
      name: production
      url: https://example.com

    steps:
      # TODO(P1-6): 见 deploy-staging step 注释
      - name: Deploy to production server (PLACEHOLDER)
        run: |
          echo "[PROD] image=${{ needs.build-image.outputs.image-tag }}"
          echo "[PROD] deployment target not configured — see TODO(P1-6) above"

      - name: Health check (PLACEHOLDER)
        run: |
          echo "[PROD] health check not configured"
          # curl -fsS https://prod.example.com/api/actuator/health | jq -e '.status == "UP"' || exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "[PROD] Deployment success notification not configured"
          # 示例: curl -X POST $SLACK_WEBHOOK_URL -d "{\"text\":\"Deploy success: ${{ github.ref_name }}\"}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "[PROD] Rollback not configured — manual intervention required"
          # 典型回滚: docker compose pull <prev-tag> && docker compose up -d
