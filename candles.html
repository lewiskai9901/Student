<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>十支蜡烛融化动画</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:20px;font-family:monospace}
.row{display:flex;gap:12px;justify-content:center}
canvas{border-radius:4px}
.label{color:rgba(255,255,255,0.25);font-size:11px;text-align:center;margin-top:2px}
.cell{display:flex;flex-direction:column;align-items:center}
h1{color:rgba(255,255,255,0.12);font-size:14px;letter-spacing:4px;margin-bottom:4px}
</style>
</head>
<body>
<h1>TEN CANDLES</h1>
<div class="row" id="row1"></div>
<div class="row" id="row2"></div>
<script>
// ============ Noise ============
function noise(t){return(Math.sin(t*1.3+Math.sin(t*0.7)*2)+Math.sin(t*2.7)*0.5+Math.sin(t*4.1)*0.25)/1.75}
function noise2(t,s){return(Math.sin(t*1.1+s*0.3+Math.sin(t*0.9+s)*1.5)+Math.sin(t*2.3+s*0.7)*0.4)/1.4}

// ============ 10 Candle Configs ============
const configs = [
  { // 1: 经典象牙白高蜡烛
    name:'象牙白',w:140,h:280,
    bodyW:40,bodyH:180,wickH:28,
    colors:['#b89840','#e8d5a0','#f5ecd0','#f2e8c8','#dcc480','#b89840'],
    poolColor:'rgba(255,240,200,0.9)',
    flameHue:30,flameSize:1,dripRate:0.012,
    meltCurve:t=>t<0.3?t/0.3*0.2:0.2+(t-0.3)/0.7*0.8
  },
  { // 2: 矮胖红蜡烛（生日风格）
    name:'生日红',w:140,h:280,
    bodyW:50,bodyH:110,wickH:22,
    colors:['#8b1a1a','#cc3333','#e04040','#dd3535','#bb2828','#7a1515'],
    poolColor:'rgba(255,150,150,0.8)',
    flameHue:25,flameSize:0.85,dripRate:0.02,
    meltCurve:t=>t*t // 加速融化
  },
  { // 3: 墨绿粗柱蜡烛
    name:'墨绿柱',w:140,h:280,
    bodyW:55,bodyH:150,wickH:25,
    colors:['#1a3a20','#2d5a35','#3a7045','#356840','#2a5530','#1a3a20'],
    poolColor:'rgba(180,230,180,0.7)',
    flameHue:35,flameSize:1.1,dripRate:0.008,
    meltCurve:t=>Math.sin(t*Math.PI/2) // 先快后慢
  },
  { // 4: 酒红细锥蜡烛
    name:'酒红锥',w:140,h:280,
    bodyW:22,bodyH:210,wickH:32,
    colors:['#3a0a15','#6b1530','#8a2040','#7a1a38','#5a1025','#3a0a15'],
    poolColor:'rgba(200,120,140,0.8)',
    flameHue:20,flameSize:0.75,dripRate:0.018,
    meltCurve:t=>t // 线性
  },
  { // 5: 宝蓝螺旋蜡烛
    name:'宝蓝旋',w:140,h:280,
    bodyW:34,bodyH:175,wickH:26,
    colors:['#0a1a4a','#1a3080','#2545a0','#204095','#162a70','#0a1a4a'],
    poolColor:'rgba(150,170,255,0.8)',
    flameHue:28,flameSize:0.9,dripRate:0.01,spiral:true,
    meltCurve:t=>t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2
  },
  { // 6: 琥珀矮宽蜡烛
    name:'琥珀宽',w:140,h:280,
    bodyW:60,bodyH:100,wickH:20,
    colors:['#8a5a10','#c08020','#d8a030','#d09528','#b07818','#8a5a10'],
    poolColor:'rgba(255,210,130,0.9)',
    flameHue:35,flameSize:1.2,dripRate:0.006,
    meltCurve:t=>{const s=Math.sin(t*6)*0.03;return Math.min(1,t+s)} // 微颤融化
  },
  { // 7: 典雅紫高蜡烛
    name:'典雅紫',w:140,h:280,
    bodyW:30,bodyH:200,wickH:30,
    colors:['#2a0a3a','#4a1a6a','#5a2580','#501f75','#3a1558','#2a0a3a'],
    poolColor:'rgba(190,150,230,0.8)',
    flameHue:32,flameSize:0.8,dripRate:0.015,
    meltCurve:t=>1-Math.pow(1-t,3) // 先快后慢（三次）
  },
  { // 8: 金棕蜂蜡烛（质感粗糙）
    name:'蜂蜡金',w:140,h:280,
    bodyW:44,bodyH:155,wickH:24,
    colors:['#7a5a10','#a07820','#b88a30','#b08528','#987018','#7a5a10'],
    poolColor:'rgba(240,210,140,0.85)',
    flameHue:38,flameSize:1.0,dripRate:0.014,rustic:true,
    meltCurve:t=>t<0.6?t/0.6*0.5:0.5+(t-0.6)/0.4*0.5
  },
  { // 9: 粉色小杯蜡烛
    name:'玫瑰粉',w:140,h:280,
    bodyW:48,bodyH:90,wickH:18,
    colors:['#8a3050','#c05070','#d86888','#d06080','#b84868','#8a3050'],
    poolColor:'rgba(255,180,200,0.85)',
    flameHue:22,flameSize:0.7,dripRate:0.005,hasHolder:true,
    meltCurve:t=>t*t*t // 慢启动
  },
  { // 10: 青碧祈愿蜡烛
    name:'青碧祈',w:140,h:280,
    bodyW:36,bodyH:165,wickH:27,
    colors:['#0a3a3a','#1a6060','#258080','#207575','#155858','#0a3a3a'],
    poolColor:'rgba(150,230,220,0.8)',
    flameHue:30,flameSize:0.95,dripRate:0.011,
    meltCurve:t=>0.5-0.5*Math.cos(t*Math.PI) // S曲线
  }
];

// ============ Candle Class ============
class Candle {
  constructor(canvas,cfg){
    this.cv=canvas;this.ctx=canvas.getContext('2d');
    this.cv.width=cfg.w;this.cv.height=cfg.h;
    this.cfg=cfg;
    this.cx=cfg.w/2;
    this.baseY=cfg.h-30;
    this.particles=[];this.drips=[];this.smoke=[];
    this.flameOut=false;this.flameOutTime=0;
    this.startTime=Date.now();
    this.DURATION=10000;
  }

  spawn(arr,obj){arr.push(obj)}

  update(){
    const now=Date.now(),elapsed=now-this.startTime;
    const t=elapsed/1000,raw=Math.min(elapsed/this.DURATION,1);
    const progress=this.cfg.meltCurve(raw);
    const c=this.cfg,ctx=this.ctx;
    const bodyH=c.bodyH*(1-progress*0.88);
    const wickH=c.wickH*(1-raw*0.3);
    const topY=this.baseY-bodyH;

    let intensity=1;
    if(raw>0.85)intensity=Math.max(0,(1-raw)/0.15);
    if(raw>=1&&!this.flameOut){this.flameOut=true;this.flameOutTime=now}

    // Clear
    ctx.clearRect(0,0,c.w,c.h);
    ctx.fillStyle='#080810';
    ctx.fillRect(0,0,c.w,c.h);

    // Ambient glow
    if(intensity>0){
      const flameY=topY-wickH;
      const g=ctx.createRadialGradient(this.cx,flameY-20,5,this.cx,flameY+30,180);
      g.addColorStop(0,`rgba(255,150,50,${0.07*intensity})`);
      g.addColorStop(0.5,`rgba(255,80,20,${0.03*intensity})`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;
      ctx.fillRect(0,0,c.w,c.h);
    }

    // Table
    const tg=ctx.createLinearGradient(0,this.baseY+5,0,c.h);
    tg.addColorStop(0,'#151520');tg.addColorStop(1,'#080810');
    ctx.fillStyle=tg;ctx.fillRect(0,this.baseY+5,c.w,c.h);
    ctx.strokeStyle='rgba(255,255,255,0.03)';
    ctx.beginPath();ctx.moveTo(0,this.baseY+6);ctx.lineTo(c.w,this.baseY+6);ctx.stroke();

    // Holder (for votive candle #9)
    if(c.hasHolder)this._drawHolder(topY,bodyH);

    // Candle body
    this._drawBody(topY,bodyH,progress);

    // Spiral stripes for #5
    if(c.spiral)this._drawSpiral(topY,bodyH,progress,t);

    // Rustic texture for #8
    if(c.rustic)this._drawRustic(topY,bodyH);

    // Drips
    if(intensity>0&&Math.random()<c.dripRate+progress*0.01){
      const side=Math.random()<0.5?-1:1;
      const bw=c.bodyW/2+progress*6;
      this.drips.push({
        x:this.cx+side*(bw-1+Math.random()*2),y:topY+Math.random()*15,
        vy:0.3+Math.random()*0.6,size:1.5+Math.random()*2,
        maxT:25+Math.random()*50,traveled:0,opacity:0.8
      });
    }
    for(let i=this.drips.length-1;i>=0;i--){
      const d=this.drips[i];
      d.y+=d.vy;d.traveled+=d.vy;
      if(d.traveled>d.maxT)d.vy*=0.88;
      if(d.vy<0.02||d.y>this.baseY){d.vy=0;d.opacity*=0.993;if(d.opacity<0.08)this.drips.splice(i,1)}
    }
    this._drawDrips(c.colors[2]);

    // Wick
    this._drawWick(topY,wickH,t,intensity);

    // Flame
    if(intensity>0){
      this._spawnFlame(topY-wickH+3,t,intensity);
      this._updateParticles();
      this._drawFlame(topY-wickH+3,t,intensity);
    }

    // Smoke
    if((raw>0.7&&intensity>0)||this.flameOut){
      const smokeRate=this.flameOut?(now-this.flameOutTime<3000?0.3*(1-(now-this.flameOutTime)/3000):0):0.15;
      if(Math.random()<smokeRate){
        this.smoke.push({
          x:this.cx+(Math.random()-0.5)*4,y:topY-wickH-10,
          vx:(Math.random()-0.5)*0.5,vy:-(0.4+Math.random()*1),
          life:0,maxLife:50+Math.random()*35,size:1.5+Math.random()*2.5,opacity:0.25+Math.random()*0.15
        });
      }
    }
    for(let i=this.smoke.length-1;i>=0;i--){
      const s=this.smoke[i];
      s.life++;s.x+=s.vx+noise(s.life*0.1+s.y*0.01)*0.7;s.y+=s.vy;s.vy*=0.99;s.size+=0.06;s.opacity*=0.98;
      if(s.life>s.maxLife)this.smoke.splice(i,1);
    }
    this._drawSmoke();

    // Timer
    const rem=Math.max(0,(this.DURATION-elapsed)/1000);
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText(rem>0?rem.toFixed(1)+'s':'out',this.cx,c.h-8);
  }

  _drawBody(topY,bodyH,progress){
    const ctx=this.ctx,c=this.cfg,cx=this.cx;
    const w=c.bodyW/2,melt=progress*8;
    const poolD=2+progress*6;

    const bg=ctx.createLinearGradient(cx-w,0,cx+w,0);
    const cl=c.colors;
    bg.addColorStop(0,cl[0]);bg.addColorStop(0.15,cl[1]);bg.addColorStop(0.4,cl[2]);
    bg.addColorStop(0.6,cl[3]);bg.addColorStop(0.85,cl[4]);bg.addColorStop(1,cl[5]);

    ctx.beginPath();
    ctx.moveTo(cx-w-melt*0.3,this.baseY);
    ctx.bezierCurveTo(cx-w-melt*0.4,this.baseY-bodyH*0.3,cx-w,topY+8,cx-w+1,topY);
    ctx.bezierCurveTo(cx-w/2,topY+poolD,cx+w/2,topY+poolD,cx+w-1,topY);
    ctx.bezierCurveTo(cx+w,topY+8,cx+w+melt*0.4,this.baseY-bodyH*0.3,cx+w+melt*0.3,this.baseY);
    ctx.closePath();
    ctx.fillStyle=bg;ctx.fill();

    // Wax pool
    ctx.beginPath();
    ctx.ellipse(cx,topY+poolD*0.5,w-1,poolD*0.6+1.5,0,0,Math.PI*2);
    const pg=ctx.createRadialGradient(cx,topY+poolD*0.5,0,cx,topY+poolD*0.5,w);
    pg.addColorStop(0,c.poolColor);pg.addColorStop(0.7,c.poolColor.replace(/[\d.]+\)$/,'0.4)'));pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg;ctx.fill();

    // Base puddle
    if(progress>0.15){
      const pw=w+melt*1.5+progress*15,ph=2+progress*5;
      ctx.beginPath();ctx.ellipse(cx,this.baseY+1,pw,ph,0,0,Math.PI*2);
      const pudG=ctx.createRadialGradient(cx,this.baseY+1,0,cx,this.baseY+1,pw);
      pudG.addColorStop(0,c.poolColor.replace(/[\d.]+\)$/,'0.5)'));pudG.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=pudG;ctx.fill();
    }
  }

  _drawSpiral(topY,bodyH,progress,t){
    const ctx=this.ctx,cx=this.cx,w=this.cfg.bodyW/2;
    ctx.save();ctx.globalAlpha=0.3;ctx.strokeStyle='rgba(100,150,255,0.4)';ctx.lineWidth=1.5;
    for(let i=0;i<12;i++){
      const y0=topY+bodyH*(i/12),y1=topY+bodyH*((i+1)/12);
      if(y0>this.baseY||y1>this.baseY)continue;
      const xOff=Math.sin(i*1.2+t*0.3)*w*0.6;
      ctx.beginPath();ctx.moveTo(cx+xOff,y0);ctx.quadraticCurveTo(cx-xOff,y0+(y1-y0)*0.5,cx+Math.sin((i+1)*1.2+t*0.3)*w*0.6,y1);
      ctx.stroke();
    }
    ctx.restore();
  }

  _drawRustic(topY,bodyH){
    const ctx=this.ctx,cx=this.cx,w=this.cfg.bodyW/2;
    ctx.save();ctx.globalAlpha=0.08;
    for(let i=0;i<20;i++){
      const y=topY+bodyH*Math.random();
      if(y>this.baseY)continue;
      const x=cx+(Math.random()-0.5)*w*1.6;
      ctx.beginPath();ctx.arc(x,y,1+Math.random()*2,0,Math.PI*2);
      ctx.fillStyle=Math.random()<0.5?'#fff':'#000';ctx.fill();
    }
    ctx.restore();
  }

  _drawHolder(topY,bodyH){
    const ctx=this.ctx,cx=this.cx,w=this.cfg.bodyW/2+8;
    const hTop=this.baseY-bodyH*0.35,hBot=this.baseY+3;
    ctx.beginPath();
    ctx.moveTo(cx-w,hBot);ctx.lineTo(cx-w+4,hTop);ctx.lineTo(cx+w-4,hTop);ctx.lineTo(cx+w,hBot);ctx.closePath();
    const hg=ctx.createLinearGradient(cx-w,0,cx+w,0);
    hg.addColorStop(0,'#444');hg.addColorStop(0.3,'#888');hg.addColorStop(0.5,'#aaa');hg.addColorStop(0.7,'#888');hg.addColorStop(1,'#444');
    ctx.fillStyle=hg;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=0.5;ctx.stroke();
  }

  _drawDrips(color){
    for(const d of this.drips){
      this.ctx.beginPath();this.ctx.arc(d.x,d.y,d.size,0,Math.PI*2);
      this.ctx.fillStyle=color.replace(')',`,${d.opacity})`).replace('rgb','rgba');
      // Use a fixed semi-transparent version of body color
      this.ctx.fillStyle=`rgba(200,180,140,${d.opacity*0.7})`;
      this.ctx.fill();
    }
  }

  _drawWick(topY,wickH,t,intensity){
    const ctx=this.ctx,cx=this.cx;
    const sway=noise(t*2+this.cfg.flameHue)*2*intensity;
    ctx.beginPath();ctx.moveTo(cx,topY+2);
    ctx.quadraticCurveTo(cx+sway*0.5,topY-wickH*0.5,cx+sway,topY-wickH);
    ctx.strokeStyle='#1a1510';ctx.lineWidth=2;ctx.stroke();
    if(intensity>0){
      ctx.beginPath();ctx.arc(cx+sway,topY-wickH+1,2,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,140,30,${0.7*intensity})`;ctx.fill();
    }
  }

  _spawnFlame(cy,t,intensity){
    const cx=this.cx,count=Math.floor(2*intensity+Math.random()*2);
    for(let i=0;i<count;i++){
      this.particles.push({
        x:cx+(Math.random()-0.5)*5*intensity,y:cy,
        vx:(Math.random()-0.5)*0.5,vy:-(1.2+Math.random()*1.8)*intensity,
        life:0,maxLife:18+Math.random()*20,size:(2.5+Math.random()*4)*this.cfg.flameSize*intensity,
        hue:this.cfg.flameHue+Math.random()*20
      });
    }
  }

  _updateParticles(){
    for(let i=this.particles.length-1;i>=0;i--){
      const p=this.particles[i];
      p.life++;p.x+=p.vx+noise(p.life*0.2+p.x)*0.3;p.vy*=0.98;p.y+=p.vy;p.size*=0.97;
      if(p.life>p.maxLife||p.size<0.2)this.particles.splice(i,1);
    }
  }

  _drawFlame(cy,t,intensity){
    const ctx=this.ctx,cx=this.cx,c=this.cfg;
    const fs=c.flameSize*intensity;
    const flicker=noise(t*3+c.flameHue)*2.5*fs;
    const sway=noise(t*1.5+c.flameHue*0.1)*3.5*fs;
    const fh=50*fs,fw=14*fs;

    ctx.save();

    // Outer glow
    const g0=ctx.createRadialGradient(cx+sway,cy-fh*0.3,0,cx+sway,cy-fh*0.2,fh);
    g0.addColorStop(0,`rgba(255,150,40,${0.1*intensity})`);g0.addColorStop(1,'rgba(255,60,10,0)');
    ctx.fillStyle=g0;ctx.fillRect(cx-fh,cy-fh*2,fh*2,fh*2.2);

    // 3-layer flame
    for(let layer=0;layer<3;layer++){
      const ls=1-layer*0.25,lfw=fw*ls,lfh=fh*ls;
      const ls2=sway*(1-layer*0.12);
      const tx=cx+ls2+flicker*0.25,ty=cy-lfh-flicker;

      ctx.beginPath();ctx.moveTo(cx-lfw*0.12,cy);
      ctx.bezierCurveTo(cx-lfw+noise2(t*2,layer)*2.5,cy-lfh*0.3,tx-lfw*0.45+noise2(t*2.5,layer)*1.5,cy-lfh*0.7,tx,ty);
      ctx.bezierCurveTo(tx+lfw*0.45+noise2(t*2.8,layer)*1.5,cy-lfh*0.7,cx+lfw+noise2(t*3.1,layer)*2.5,cy-lfh*0.3,cx+lfw*0.12,cy);
      ctx.closePath();

      if(layer===0){
        const g=ctx.createLinearGradient(cx,cy,tx,ty);
        g.addColorStop(0,`rgba(255,170,45,${0.85*intensity})`);g.addColorStop(0.35,`rgba(255,110,18,${0.75*intensity})`);
        g.addColorStop(0.65,`rgba(255,70,8,${0.5*intensity})`);g.addColorStop(1,`rgba(255,45,5,${0.08*intensity})`);
        ctx.fillStyle=g;
      }else if(layer===1){
        const g=ctx.createLinearGradient(cx,cy,tx,ty);
        g.addColorStop(0,`rgba(255,225,110,${0.9*intensity})`);g.addColorStop(0.4,`rgba(255,190,70,${0.7*intensity})`);
        g.addColorStop(0.8,`rgba(255,130,25,${0.3*intensity})`);g.addColorStop(1,'rgba(255,90,10,0)');
        ctx.fillStyle=g;
      }else{
        const g=ctx.createLinearGradient(cx,cy-4,tx,ty+lfh*0.15);
        g.addColorStop(0,`rgba(255,255,215,${0.95*intensity})`);g.addColorStop(0.3,`rgba(255,245,190,${0.8*intensity})`);
        g.addColorStop(0.7,`rgba(255,215,120,${0.4*intensity})`);g.addColorStop(1,'rgba(255,190,70,0)');
        ctx.fillStyle=g;
      }
      ctx.fill();
    }

    // Blue core
    ctx.beginPath();
    const bw=6*fs,bh=9*fs;
    ctx.ellipse(cx,cy-1,bw,bh,0,0,Math.PI*2);
    const bg=ctx.createRadialGradient(cx,cy-1,0,cx,cy-1,bh);
    bg.addColorStop(0,`rgba(90,140,255,${0.65*intensity})`);bg.addColorStop(0.5,`rgba(70,110,240,${0.25*intensity})`);bg.addColorStop(1,'rgba(50,70,200,0)');
    ctx.fillStyle=bg;ctx.fill();

    // Particles
    for(const p of this.particles){
      const a=(1-p.life/p.maxLife)*0.5*intensity;
      const r=p.size;
      const pg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r);
      pg.addColorStop(0,`hsla(${p.hue},100%,68%,${a})`);pg.addColorStop(1,`hsla(${p.hue},100%,48%,0)`);
      ctx.fillStyle=pg;ctx.fillRect(p.x-r,p.y-r,r*2,r*2);
    }

    ctx.restore();
  }

  _drawSmoke(){
    for(const s of this.smoke){
      const a=s.opacity*(1-s.life/s.maxLife);
      if(a<=0)continue;
      const g=this.ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.size);
      g.addColorStop(0,`rgba(175,175,190,${a})`);g.addColorStop(1,'rgba(150,150,165,0)');
      this.ctx.fillStyle=g;this.ctx.beginPath();this.ctx.arc(s.x,s.y,s.size,0,Math.PI*2);this.ctx.fill();
    }
  }
}

// ============ Setup ============
const candles=[];
configs.forEach((cfg,i)=>{
  const row=document.getElementById(i<5?'row1':'row2');
  const cell=document.createElement('div');cell.className='cell';
  const cv=document.createElement('canvas');
  const label=document.createElement('div');label.className='label';label.textContent=cfg.name;
  cell.appendChild(cv);cell.appendChild(label);row.appendChild(cell);
  candles.push(new Candle(cv,cfg));
});

function loop(){
  for(const c of candles)c.update();
  requestAnimationFrame(loop);
}
loop();
</script>
