# 开发环境配置
# 注意: 所有敏感配置都应通过环境变量设置，不要硬编码密码
# 首次使用请复制 .env.example 到 .env 并配置您的本地环境

app:
  security:
    default-password: admin123

spring:
  # Phase 6.3 旧默认 lazy-initialization=true 砍 20-40s 启动, 但导致 ApplicationRunner /
  # @EventListener 在 dev 下不可靠装配 (WorkflowContributionDeployer 启动期不跑 →
  # CoreManifest 3 个 BPMN 没真部署). E2E 联调起改 false, 接受启动延迟.
  main:
    lazy-initialization: false
  # Phase 6.3 之前 dev 默认 exclude 全部 Flowable AutoConfiguration 省 22s 启动,
  # 但导致 /api/workflow/* 端点 NoSuchBeanDefinitionException 500 (RepositoryService 缺失).
  # E2E 联调起改: dev 默认装配 Flowable, 启动延迟可接受.
  # 若需重回 dev 快启动模式: 再次 exclude 这批 + Controller 加 @Profile("workflow").

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:student_management}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    druid:
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: ${DRUID_USERNAME:admin}
        login-password: ${DRUID_PASSWORD:}
      web-stat-filter:
        enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

# 日志配置
logging:
  level:
    root: INFO
    com.school.management: DEBUG
  file:
    name: logs/student-management-dev.log

# JWT配置 - 开发环境使用固定密钥
jwt:
  secret-key: dev-secret-key-for-local-development-must-be-at-least-64-bytes-long-for-hs512
  access-token-expiration: 86400000  # 24小时（开发环境延长）
  refresh-token-expiration: 2592000000  # 30天

# Casbin配置 - 启用 Casbin 作为唯一数据权限引擎
casbin:
  enabled: true

# 开发工具
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,loggers,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      access: read_only

# 微信公众号配置
wechat:
  app-id: 你的AppID          # 在微信公众平台获取
  app-secret: 你的AppSecret  # 在微信公众平台获取
  share-base-url: http://localhost:3000
  template:
    enabled: true            # 启用推送功能
    announcement-template-id:   # 公告模板ID，在公众号后台获取
    notification-template-id:   # 通报模板ID，在公众号后台获取