server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: student-management-system

  profiles:
    active: dev

  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:student_management}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    druid:
      # 连接池配置优化
      initial-size: 10          # 初始连接数从5增加到10
      min-idle: 10              # 最小空闲连接数从5增加到10
      max-active: 50            # 最大活跃连接数从20增加到50
      max-wait: 10000           # 最大等待时间从60秒减少到10秒

      # 连接保活配置
      time-between-eviction-runs-millis: 60000      # 60秒检测一次空闲连接
      min-evictable-idle-time-millis: 300000        # 连接在池中最小生存时间5分钟
      max-evictable-idle-time-millis: 900000        # 连接在池中最大生存时间15分钟

      # 连接验证配置
      validation-query: SELECT 1                     # 验证查询
      validation-query-timeout: 3                    # 验证超时3秒
      test-while-idle: true                          # 空闲时验证连接
      test-on-borrow: false                          # 获取连接时不验证(性能优化)
      test-on-return: false                          # 归还连接时不验证

      # PreparedStatement缓存配置
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20

      # 监控统计配置
      filters: stat,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=2000  # 慢SQL阈值从5秒降低到2秒

      # 统计配置 - 默认禁用，仅开发环境按需启用
      stat-view-servlet:
        enabled: ${DRUID_MONITOR_ENABLED:false}       # 默认禁用，开发环境可设置为true
        url-pattern: /druid/*                         # 监控页面访问路径
        reset-enable: false                           # 禁止重置统计数据
        login-username: ${DRUID_MONITOR_USER:}        # 必须通过环境变量配置
        login-password: ${DRUID_MONITOR_PWD:}         # 必须通过环境变量配置
        allow: ${DRUID_MONITOR_ALLOW:127.0.0.1}       # IP白名单，仅允许本地访问

      # Web监控配置
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"

      # Wall Filter配置 - 关闭严格的SQL检查
      wall:
        enabled: false

      # 连接泄漏检测
      remove-abandoned: true                          # 开启连接泄漏检测
      remove-abandoned-timeout: 1800                  # 30分钟未关闭的连接视为泄漏
      log-abandoned: true                             # 记录泄漏连接的堆栈信息

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 1000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
        shutdown-timeout: 100ms

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: >
    com.school.management.entity,
    com.school.management.infrastructure.persistence.organization,
    com.school.management.infrastructure.persistence.inspection,
    com.school.management.infrastructure.persistence.access

# 日志配置
logging:
  level:
    com.school.management: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'

# JWT配置 - 必须通过环境变量配置 JWT_SECRET
jwt:
  secret-key: ${JWT_SECRET}  # 至少64字节，用于HS512算法
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:7200000} # 2小时(毫秒)
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:2592000000} # 30天(毫秒)

# Casbin 数据权限配置
casbin:
  enabled: ${CASBIN_ENABLED:true}  # 启用 Casbin 数据权限系统
  model-path: casbin/model.conf  # 模型配置文件路径(相对于classpath)
  auto-save: true  # 自动保存策略变更

# 文件存储配置
file:
  upload:
    path: ${FILE_UPLOAD_PATH:D:/学生管理系统/uploads/}
    url-prefix: ${FILE_URL_PREFIX:http://localhost:8080/api/uploads}
    max-size: 10485760  # 10MB
    allowed-types: jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx

# 微信配置
wechat:
  app-id: ${WECHAT_APP_ID:}
  app-secret: ${WECHAT_APP_SECRET:}
  share-base-url: ${WECHAT_SHARE_BASE_URL:http://localhost:3000}
  miniapp:
    appid: ${WECHAT_MINIAPP_APPID:}
    secret: ${WECHAT_MINIAPP_SECRET:}
  # 模板消息配置
  template:
    enabled: ${WECHAT_TEMPLATE_ENABLED:false}                           # 是否启用推送
    announcement-template-id: ${WECHAT_ANNOUNCEMENT_TEMPLATE_ID:}       # 公告推送模板ID
    notification-template-id: ${WECHAT_NOTIFICATION_TEMPLATE_ID:}       # 通报推送模板ID

# SpringDoc OpenAPI配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    display-request-duration: true
    deep-linking: true
    disable-swagger-default-url: true
    use-root-path: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  show-actuator: false
  group-configs:
    - group: default
      paths-to-match: /api/**

# CORS配置
cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGIN_1:http://localhost:3000}
    - ${CORS_ALLOWED_ORIGIN_2:http://localhost:5173}
    - ${CORS_ALLOWED_ORIGIN_3:http://127.0.0.1:3000}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: Authorization,Content-Type,Accept,X-Requested-With,Cache-Control
  allow-credentials: true
  max-age: 3600

# Flowable工作流配置
flowable:
  # 数据库表更新策略: true=自动创建/更新表, false=不自动创建
  database-schema-update: true
  # 异步执行器配置
  async-executor-activate: true
  # 历史记录级别: none, activity, audit, full
  history-level: audit
  # 流程定义文件位置
  process-definition-location-prefix: classpath*:/processes/
  # 流程定义文件后缀
  process-definition-location-suffixes:
    - "**.bpmn20.xml"
    - "**.bpmn"
  # 禁用自动部署演示流程
  check-process-definitions: false
  # ID生成器类型
  id-generator: uuid
  # REST API配置
  rest:
    app:
      enabled: true
      authentication-mode: verify-privilege
