# Casbin PERM Model for Student Management System
# 学生管理系统数据权限模型
#
# 设计思路:
# - 角色(g)定义功能权限
# - 范围(g2)定义数据权限，与角色解耦
# - 策略(p)绑定角色、范围、资源和操作
#
# 范围关系通过 g2 分组实现:
# - g2(user:1, scope:class:101) 表示用户1拥有班级101的访问权限
# - g2(scope:class:101, scope:grade:24) 表示班级101属于24级

[request_definition]
# 请求定义: 主体, 范围, 资源, 操作
r = sub, scope, obj, act

[policy_definition]
# 策略定义: 主体(角色), 范围模式, 资源, 操作, 效果
p = sub, scope, obj, act, eft

[role_definition]
# g: 用户-角色关系
g = _, _

# g2: 范围关系
# 用于: 用户-范围分配 和 范围层级关系
g2 = _, _

[policy_effect]
# 策略效果: allow优先，但deny可覆盖
e = some(where (p.eft == allow)) && !some(where (p.eft == deny))

[matchers]
# 匹配规则:
# 1. 检查用户是否拥有策略中的角色 (g)
# 2. 检查范围匹配:
#    - 策略范围为 * 时匹配所有
#    - 请求范围与策略范围相等
#    - 请求范围通过 g2 继承自策略范围
# 3. 检查资源匹配 (支持通配符*)
# 4. 检查操作匹配 (支持通配符*)
m = g(r.sub, p.sub) && \
    (p.scope == "*" || r.scope == p.scope || g2(r.scope, p.scope)) && \
    (r.obj == p.obj || p.obj == "*") && \
    (r.act == p.act || p.act == "*")
