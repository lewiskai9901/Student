version: '3.8'

# Development environment - only databases, app runs locally
services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: sms-dev-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=student_management
      - MYSQL_USER=dev_user
      - MYSQL_PASSWORD=dev123
    ports:
      - "3306:3306"
    volumes:
      - mysql-dev-data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sms-dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer for database management (optional)
  adminer:
    image: adminer
    container_name: sms-dev-adminer
    ports:
      - "8081:8080"
    networks:
      - dev-network
    depends_on:
      - mysql

  # Redis Commander for Redis management (optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: sms-dev-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8082:8081"
    networks:
      - dev-network
    depends_on:
      - redis

volumes:
  mysql-dev-data:
    driver: local
  redis-dev-data:
    driver: local

networks:
  dev-network:
    driver: bridge
