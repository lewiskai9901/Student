<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博核心 | CyberCore</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Russo+One&display=swap');

        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --bg-dark: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Russo One', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px; /* 3D 视差基础 */
        }

        /* 背景网格动画 */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); }
        }

        /* 3D 卡片容器 */
        .card {
            position: relative;
            width: 500px;
            padding: 60px 40px;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            backdrop-filter: blur(10px);
            transform-style: preserve-3d;
            transform: rotateX(var(--rx)) rotateY(var(--ry));
            transition: transform 0.1s ease-out;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.1);
        }

        /* 装饰角标 */
        .card::before, .card::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-cyan);
            transition: 0.3s;
        }
        .card::before { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .card::after { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        /* 故障文字特效 */
        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            position: relative;
            text-shadow: 2px 2px var(--neon-pink), -2px -2px var(--neon-cyan);
            animation: glitch 1s infinite alternate;
            transform: translateZ(50px); /* 文字悬浮 */
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px var(--neon-pink), -2px -2px var(--neon-cyan); }
            25% { text-shadow: -2px 2px var(--neon-pink), 2px -2px var(--neon-cyan); }
            50% { text-shadow: 2px -2px var(--neon-pink), -2px 2px var(--neon-cyan); }
            75% { text-shadow: -2px -2px var(--neon-pink), 2px 2px var(--neon-cyan); }
            100% { text-shadow: 2px 2px var(--neon-pink), -2px -2px var(--neon-cyan); }
        }

        p {
            margin-top: 20px;
            color: #aaa;
            font-size: 1.2rem;
            transform: translateZ(30px);
        }

        /* 赛博按钮 */
        .btn {
            margin-top: 40px;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            transform: translateZ(40px);
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }
        .btn:hover::before {
            left: 100%;
        }

    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="card" id="card">
        <h1>系统接入</h1>
        <p>检测到神经链接... 正在同步数据流</p>
        <p style="font-size: 0.9rem; color: var(--neon-pink); margin-top: 10px;">警告：现实边界已模糊</p>
        <button class="btn">初始化连接</button>
    </div>

    <script>
        const card = document.getElementById('card');
        const body = document.querySelector('body');

        // 鼠标移动视差效果
        body.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 20;
            const y = (window.innerHeight / 2 - e.pageY) / 20;

            // 设置 CSS 变量供 transform 使用
            card.style.setProperty('--rx', `${y}deg`);
            card.style.setProperty('--ry', `${-x}deg`);
        });

        // 鼠标移出复位
        body.addEventListener('mouseleave', () => {
            card.style.setProperty('--rx', `0deg`);
            card.style.setProperty('--ry', `0deg`);
        });
    </script>
</body>
</html>
