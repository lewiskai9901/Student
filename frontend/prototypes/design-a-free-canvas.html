<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案A：自由画布 - 排座与平面图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f7fa; color: #1f2937; }

  .app { display: flex; height: 100vh; }

  /* Left Toolbar */
  .toolbar {
    width: 52px; background: #1e293b; display: flex; flex-direction: column; align-items: center;
    padding: 12px 0; gap: 4px; flex-shrink: 0;
  }
  .toolbar .brand { color: #94a3b8; font-size: 10px; margin-bottom: 8px; letter-spacing: 1px; }
  .tool-btn {
    width: 40px; height: 40px; border: none; background: transparent; color: #94a3b8;
    border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all .15s; position: relative;
  }
  .tool-btn:hover { background: #334155; color: #e2e8f0; }
  .tool-btn.active { background: #3b82f6; color: #fff; }
  .tool-btn .tooltip {
    display: none; position: absolute; left: 52px; top: 50%; transform: translateY(-50%);
    background: #1e293b; color: #e2e8f0; padding: 4px 10px; border-radius: 6px;
    font-size: 12px; white-space: nowrap; z-index: 100; pointer-events: none;
  }
  .tool-btn:hover .tooltip { display: block; }
  .tool-divider { width: 28px; height: 1px; background: #334155; margin: 4px 0; }

  /* Left Panel */
  .left-panel {
    width: 220px; background: #fff; border-right: 1px solid #e5e7eb;
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .panel-header {
    padding: 14px 16px 10px; border-bottom: 1px solid #f3f4f6;
    font-size: 13px; font-weight: 600; color: #374151;
  }
  .element-list { flex: 1; overflow-y: auto; padding: 8px; }
  .element-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-radius: 6px; cursor: pointer; font-size: 12px; transition: background .1s;
  }
  .element-item:hover { background: #f3f4f6; }
  .element-item.selected { background: #eff6ff; color: #1d4ed8; }
  .element-item .icon { width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .element-item .icon.seat { background: #dbeafe; color: #2563eb; }
  .element-item .icon.desk { background: #fef3c7; color: #d97706; }
  .element-item .icon.wall { background: #e5e7eb; color: #6b7280; }
  .element-item .icon.door { background: #d1fae5; color: #059669; }
  .element-item .label { flex: 1; }
  .element-item .sublabel { color: #9ca3af; font-size: 11px; }

  /* Canvas Area */
  .canvas-area {
    flex: 1; display: flex; flex-direction: column; min-width: 0;
  }
  .canvas-topbar {
    height: 44px; background: #fff; border-bottom: 1px solid #e5e7eb;
    display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0;
  }
  .canvas-topbar .room-name { font-size: 14px; font-weight: 600; }
  .canvas-topbar .room-info { font-size: 12px; color: #6b7280; }
  .canvas-topbar .spacer { flex: 1; }
  .zoom-controls { display: flex; align-items: center; gap: 4px; }
  .zoom-btn {
    width: 28px; height: 28px; border: 1px solid #d1d5db; background: #fff; border-radius: 6px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px;
    color: #374151;
  }
  .zoom-btn:hover { background: #f9fafb; }
  .zoom-label { font-size: 12px; color: #6b7280; min-width: 40px; text-align: center; }

  .canvas-wrapper {
    flex: 1; overflow: hidden; background: #f0f2f5; position: relative;
    background-image: radial-gradient(circle, #d1d5db 1px, transparent 1px);
    background-size: 20px 20px;
  }
  .canvas-svg {
    width: 100%; height: 100%;
  }

  /* Elements on canvas */
  .cv-seat {
    cursor: pointer; transition: filter .1s;
  }
  .cv-seat:hover { filter: brightness(0.95); }
  .cv-seat.occupied .seat-body { fill: #dbeafe; stroke: #93c5fd; }
  .cv-seat.empty .seat-body { fill: #fff; stroke: #d1d5db; stroke-dasharray: 4 2; }
  .cv-seat .seat-label { font-size: 10px; fill: #6b7280; font-weight: 500; text-anchor: middle; }
  .cv-seat.occupied .seat-name { font-size: 9px; fill: #1d4ed8; font-weight: 600; text-anchor: middle; }
  .cv-desk { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.5; rx: 3; }
  .cv-wall { fill: #9ca3af; stroke: #6b7280; stroke-width: 1; }
  .cv-door { fill: #d1fae5; stroke: #10b981; stroke-width: 1.5; rx: 2; }
  .cv-room-outline { fill: none; stroke: #374151; stroke-width: 2; }

  /* Right Panel - Properties */
  .right-panel {
    width: 240px; background: #fff; border-left: 1px solid #e5e7eb;
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .prop-section { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; }
  .prop-section .title { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .prop-row { display: flex; align-items: center; margin-bottom: 8px; }
  .prop-row .prop-label { width: 60px; font-size: 12px; color: #6b7280; flex-shrink: 0; }
  .prop-row .prop-input {
    flex: 1; height: 28px; border: 1px solid #e5e7eb; border-radius: 6px;
    padding: 0 8px; font-size: 12px; outline: none;
  }
  .prop-row .prop-input:focus { border-color: #3b82f6; }
  .prop-row .prop-value { font-size: 12px; color: #1f2937; }
  .prop-xy { display: flex; gap: 8px; }
  .prop-xy .xy-group { display: flex; align-items: center; gap: 4px; flex: 1; }
  .prop-xy .xy-label { font-size: 11px; color: #9ca3af; font-weight: 500; }
  .prop-xy .xy-input {
    width: 100%; height: 28px; border: 1px solid #e5e7eb; border-radius: 6px;
    padding: 0 6px; font-size: 12px; outline: none; text-align: center;
  }

  /* Occupant Section */
  .occupant-card {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-radius: 6px; font-size: 12px; cursor: grab; transition: background .1s;
  }
  .occupant-card:hover { background: #f3f4f6; }
  .occupant-card .avatar {
    width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0;
  }
  .occupant-card .avatar.male { background: #60a5fa; }
  .occupant-card .avatar.female { background: #f472b6; }
  .occupant-card .name { font-weight: 500; }
  .occupant-card .dept { color: #9ca3af; font-size: 11px; }
  .occupant-card .pos { margin-left: auto; color: #6b7280; font-size: 11px; background: #f3f4f6; padding: 2px 6px; border-radius: 4px; }

  /* Status bar */
  .status-bar {
    height: 32px; background: #fff; border-top: 1px solid #e5e7eb;
    display: flex; align-items: center; padding: 0 16px; gap: 16px;
    font-size: 11px; color: #6b7280;
  }
  .status-bar .stat { display: flex; align-items: center; gap: 4px; }
  .status-bar .dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-bar .dot.blue { background: #3b82f6; }
  .status-bar .dot.gray { background: #d1d5db; }
  .status-bar .dot.yellow { background: #f59e0b; }

  .action-bar {
    padding: 12px 16px; border-top: 1px solid #f3f4f6;
    display: flex; gap: 8px;
  }
  .btn {
    flex: 1; height: 32px; border: none; border-radius: 6px; font-size: 12px;
    cursor: pointer; font-weight: 500; transition: all .15s;
  }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-outline { background: #fff; color: #374151; border: 1px solid #d1d5db; }
  .btn-outline:hover { background: #f9fafb; }
</style>
</head>
